<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parikshith — Portfolio</title>
    <script>
        // Device Detection & Routing Logic
        // This router keeps mobile and desktop versions completely separate
        
        function detectDevice() {
            // User Agent Detection
            const ua = navigator.userAgent.toLowerCase();
            const isMobile = /mobile|android|iphone|ipad|phone|touch|webos|blackberry|windows phone/i.test(ua);
            
            // Screen Size Detection (fallback)
            const screenWidth = window.innerWidth;
            const isSmallScreen = screenWidth < 768;
            
            // Combined detection
            return isMobile || isSmallScreen;
        }
        
        function routeToCorrectVersion() {
            const isMobile = detectDevice();
            
            if (isMobile) {
                // Load mobile version (completely separate, no mixing)
                window.location.replace('./frontend/dist/mobile-portfolio.html');
            } else {
                // Load desktop version (Vite built app)
                window.location.replace('./frontend/dist/index.html');
            }
        }
        
        // Route immediately on page load
        routeToCorrectVersion();
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0E0C08;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #E8E0D0;
        }
        
        .loading {
            text-align: center;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(212, 168, 67, 0.2);
            border-top: 2px solid #D4A843;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Loading your portfolio...</p>
    </div>
    
    <noscript>
        <p>
            JavaScript is required. 
            <a href="./frontend/dist/index.html">Click here to view the desktop version</a> or 
            <a href="./mobile-portfolio.html">click here for mobile</a>
        </p>
    </noscript>
</body>
</html>
